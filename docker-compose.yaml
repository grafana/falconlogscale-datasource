version: '3.0'

services:
  grafana:
    build:
      args:
        grafana_version: ${GRAFANA_VERSION:-9.1.2}
    ports:
      - 3000:3000/tcp
    environment:
      LOGSCALE_URL: ${LOGSCALE_URL}
      ACCESS_TOKEN: ${ACCESS_TOKEN}
    extends:
      file: .config/docker-compose-base.yaml
      service: grafana
